<!DOCTYPE html>
<html>
<head>
    <title>NCBI Access Tool</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>NCBI Access Web Tool</h1>
    <p><b>Search biological databases with ease</b></p>
    <p>Users choice</p>
</header>

<div class="container">

    <h2>Search NCBI Databases</h2>

    <form action="https://www.ncbi.nlm.nih.gov/search/all/" method="GET" target="_blank">
        <input type="text" name="term" placeholder="Enter gene / protein / disease">
        <button type="submit">Search</button>
    </form>

</div>

<footer>
    <p>Powered by NCBI | My first Project</p>
    <p><u>Smooth as never before</u></p>
</footer>

</body>
</html>
